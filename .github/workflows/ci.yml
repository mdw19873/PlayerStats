name: CI

# Build and test on every push to main and on pull requests targeting main.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Least-privilege: the build only needs to read the repository.
permissions:
  contents: read

# Cancel superseded runs for the same branch/PR to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      # Java 17 is the compile target / support floor; Java 21 is the runtime used
      # by Minecraft 1.20.5+ servers; Java 25 is the current LTS (forward-compat
      # check). Verify the build and tests on all three.
      matrix:
        java: [ '17', '21', '25' ]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Build, test and package
        run: mvn -B --no-transfer-progress clean verify

      - name: Upload test reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: surefire-reports-jdk${{ matrix.java }}
          path: target/surefire-reports/
          if-no-files-found: ignore

      - name: Upload coverage report
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-report-jdk${{ matrix.java }}
          path: target/site/jacoco/
          if-no-files-found: ignore

      # Publish the shaded plugin jar once (from the Java 17 build) for easy testing.
      - name: Upload plugin jar
        if: ${{ matrix.java == '17' }}
        uses: actions/upload-artifact@v7
        with:
          name: PlayerStats-plugin
          path: target/PlayerStats-*.jar
          if-no-files-found: error
